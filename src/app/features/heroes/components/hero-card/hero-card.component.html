    <mat-card appearance="outlined" >
      <mat-card-header>
        <mat-card-title>{{ hero().name }}</mat-card-title>
        <mat-card-subtitle>{{ hero().alias }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <p class="power">{{ hero().power }}</p>
        <mat-chip-set>
          <mat-chip [highlighted]="true">{{ hero().universe }}</mat-chip>
        </mat-chip-set>
      </mat-card-content>

      <mat-card-actions align="end">
        <button
          mat-icon-button
          color="primary"
          matTooltip="Editar"
          (click)="editClicked.emit(hero())"
          aria-label="Editar héroe"
        >
          <mat-icon>edit</mat-icon>
        </button>
        <button
          mat-icon-button
          color="warn"
          matTooltip="Eliminar"
          (click)="deleteClicked.emit(hero())"
          aria-label="Eliminar héroe"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
