    <div class="hero-card">
      <!-- Universe badge -->
      <span
        class="universe-badge"
        [style.background]="universeStyle.bg"
        [style.color]="universeStyle.color"
      >
        {{ hero().universe }}
      </span>

      <!-- Content -->
      <div class="card-body">
        <h3 class="hero-name">{{ hero().name }}</h3>
        <p class="hero-alias">{{ hero().alias }}</p>
        <p class="hero-power">{{ hero().power }}</p>
      </div>

      <!-- Actions -->
      <div class="card-actions">
        <button
          mat-icon-button
          class="action-btn edit-btn"
          matTooltip="Editar héroe"
          (click)="editClicked.emit(hero())"
          aria-label="Editar héroe"
        >
          <mat-icon>edit</mat-icon>
        </button>
        <button
          mat-icon-button
          class="action-btn delete-btn"
          matTooltip="Eliminar héroe"
          (click)="deleteClicked.emit(hero())"
          aria-label="Eliminar héroe"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </div>
